name: Sonarqube Scan and Analysis
'on':
  push:
    branches:
    - main
    - dev
    - QA
    - sonar-cqa
  pull_request:
    branches:
    - main
  workflow_dispatch:
jobs:
  build:
    name: Build and analyze
    uses: atge-org/atge-sq-cmncfgs/.github/workflows/sonar-build.yml@main
    secrets:
      KSM_CONFIG: ${{ secrets.KSM_CONFIG }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_ROOT_CERT: ${{ secrets.SONAR_ROOT_CERT }}
